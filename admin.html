<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Skating Hour — Admin Schedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=6">
    <style>
        body { background: linear-gradient(135deg, #f6f8ff 0%, #eef1f9 50%, #e3eaff 100%); overflow-y: auto; }
        :root {
            --primary: #0f4cdb;
            --secondary: #f4620a;
            --bg: #f8faff;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text: #050d1e;
        }
        body { background: linear-gradient(135deg, #f6f8ff 0%, #eef1f9 50%, #e3eaff 100%); background-size: 400% 400%; animation: bgShift 15s ease infinite; overflow-y: auto; font-family: 'Kanit', sans-serif; color: var(--text); }
        
        .admin-container { max-width: 1200px; margin: 120px auto 40px; padding: 0 20px; }
        .glass-panel { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 24px; padding: 3rem; box-shadow: 0 20px 50px rgba(15,76,219,.06); }
        
        .header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem; }
        .admin-title { font-family: 'Kanit', sans-serif; font-size: 4rem; color: var(--text); letter-spacing: 1px; margin: 0; line-height: 1; }
        .admin-sub { color: #666; margin-top: 0.5rem; font-size: 1.1rem; }

        .class-list { display: grid; gap: 1.5rem; }
        .class-card { background: #fff; border-radius: 16px; padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border-left: 5px solid var(--primary); transition: all 0.3s ease; }
        .class-card:hover { transform: translateX(8px); box-shadow: 0 10px 30px rgba(15,76,219,0.08); }
        .class-info h4 { margin: 0 0 0.4rem; font-size: 1.3rem; color: var(--primary); }
        .class-meta { display: flex; gap: 1.5rem; font-size: 0.9rem; color: #555; }
        .class-meta span { display: flex; align-items: center; gap: 0.5rem; }
        
        .card-actions { display: flex; gap: 0.8rem; }
        .btn-icon { width: 40px; height: 40px; border-radius: 10px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .btn-edit { background: #eef3ff; color: var(--primary); }
        .btn-edit:hover { background: var(--primary); color: #fff; }
        .btn-delete { background: #fff1f1; color: #f44336; }
        .btn-delete:hover { background: #f44336; color: #fff; }

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: #fff; width: 90%; max-width: 550px; border-radius: 24px; padding: 2.5rem; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal-overlay.active .modal-content { transform: scale(1); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-top: 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group.full { grid-column: span 2; }
        .form-group label { font-size: 0.85rem; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select { padding: 0.8rem 1rem; border: 1px solid #eee; border-radius: 12px; font-family: inherit; font-size: 0.95rem; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: var(--primary); background: #f8faff; }

        .modal-footer { margin-top: 2rem; display: flex; justify-content: flex-end; gap: 1rem; }
        .btn-cancel { padding: 0.8rem 1.5rem; background: #f5f5f5; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .btn-save { padding: 0.8rem 2rem; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(15,76,219,0.3); }

        .admin-msg { position: fixed; bottom: 30px; right: 30px; padding: 1rem 2rem; background: #2ed573; color: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(46,213,115,0.3); display: none; z-index: 2000; transform: translateY(100px); transition: transform 0.4s; }
        .admin-msg.show { transform: translateY(0); display: block; }
        
        nav { background: #0f4cdb !important; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: 0 8px 32px rgba(15,76,219,0.2) !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: .7rem 5rem !important; }
        nav .logo-main, nav .logo-tag { color: #fff !important; }
        nav .nl { color: rgba(255, 255, 255, 0.8) !important; transition: all 0.3s; position: relative; text-decoration: none !important; font-weight: 600 !important; }
        nav .nl:hover { color: #fff !important; }
        nav .nl.active { color: #fff !important; }
        nav .nl::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: #fff !important; transition: width 0.3s; }
        nav .nl.active::after { width: 100% !important; }
        nav .nl:hover::after { width: 100% !important; }
        .logo-box { background: #fff !important; padding: 4px; display: flex; align-items: center; justify-content: center; }
        .logo-box svg { width: 24px; height: 24px; }
        .logo-box svg circle { stroke: #0f4cdb !important; }
        .logo-box svg path { stroke: #0f4cdb !important; fill: rgba(15, 76, 219, 0.1) !important; }
        
        .btn-add-fix { background: linear-gradient(135deg, var(--primary), #2d6ef5); color: #fff; border: none; padding: 0.8rem 1.5rem; border-radius: 12px; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; box-shadow: 0 4px 15px rgba(15,76,219,0.2); }
        .btn-add-fix span { font-size: 1.2rem; font-weight: 400; }
        body, a, button, .btn-fire, .logo, .nl, input, textarea { cursor: auto !important; }
    </style>
</head>
<body>
    <nav id="nav">
        <a class="logo" href="index.html">
            <div class="logo-box">
                <svg viewBox="0 0 28 28">
                    <circle cx="20" cy="5" r="3" stroke="#fff" stroke-width="1.5" fill="none" />
                    <path d="M6 20 C8 14,13 12,17 9 L21 8 L19 16 C17 18,14 20,11 23 L8 26 L5 24 Z" stroke="#fff" stroke-width="1.5" fill="rgba(255,255,255,.2)" />
                </svg>
            </div>
            <div class="logo-words">
                <div class="logo-main">SKATING<span>HOUR</span></div>
                <span class="logo-tag">Admin Panel</span>
            </div>
        </a>
        <ul id="nav-ul">
            <li><a class="nl active" href="admin.html">Schedules</a></li>
            <li><a class="nl" href="enquiries.html">Database</a></li>
            <li><a class="nl" href="livechat.html">Live Chat</a></li>
            <li><a class="nl" href="index.html">Back to Site</a></li>
        </ul>
    </nav>

    <div class="admin-container">
        <div class="glass-panel">
            <div class="header-flex">
                <div>
                    <h1 class="admin-title">Class Schedules</h1>
                    <p class="admin-sub">Manage locations, timings, and sessions across the platform.</p>
                </div>
                <button class="btn-add-fix" onclick="openModal()"><span>+</span> Add New Class</button>
            </div>
            
            <div id="class-list-container" class="class-list">
                <!-- Classes will be injected here -->
                <div style="text-align: center; padding: 3rem; color: #888;">
                    Loading schedules...
                </div>
            </div>
        </div>
    </div>

    <!-- ADD/EDIT MODAL -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title" style="font-family: 'Kanit', sans-serif; font-size: 2.5rem; margin: 0;">Add New Class</h2>
            <p style="color: #666; margin-top: 0.5rem;">Fill in the details for the skating session.</p>
            
            <form id="class-form">
                <input type="hidden" id="form-id">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Location (City)</label>
                        <select id="form-location" required>
                            <option value="Hamilton">Hamilton</option>
                            <option value="Milton">Milton</option>
                            <option value="Oakville">Oakville</option>
                            <option value="Mississauga">Mississauga (Coming Soon)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Venue Name</label>
                        <input type="text" id="form-venue" placeholder="e.g. Dave Andre Arena" required>
                    </div>
                    <div class="form-group">
                        <label>Sessions (Days)</label>
                        <input type="text" id="form-sessions" placeholder="e.g. Saturday" required>
                    </div>
                    <div class="form-group">
                        <label>Timing</label>
                        <input type="text" id="form-timing" placeholder="e.g. 6:30 PM – 7:30 PM" required>
                    </div>
                    <div class="form-group full">
                        <label>Date Description</label>
                        <input type="text" id="form-date" placeholder="e.g. Mar 21 – Apr 25, 2026" required>
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-save">Save Class</button>
                </div>
            </form>
        </div>
    </div>

    <div class="admin-msg" id="admin-msg">Schedules updated successfully!</div>
    
    <script src="admin.js"></script>
</body>
</html>
