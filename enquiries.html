<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Skating Hour — Enquiries Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        @keyframes bgShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        body { background: linear-gradient(135deg, #f6f8ff 0%, #eef1f9 50%, #e3eaff 100%); background-size: 400% 400%; animation: bgShift 15s ease infinite; overflow-y: auto; font-family: 'Kanit', sans-serif; }
        .admin-wrap { max-width: 1050px; margin: 120px auto 40px; padding: 2.5rem; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 16px; box-shadow: 0 20px 50px rgba(15,76,219,.08); position: relative; z-index: 10; }
        .admin-title { font-family: 'Kanit', sans-serif; font-size: 3.5rem; margin-bottom: 0.5rem; color: #050d1e; letter-spacing: 1px; }
        .loc-form { padding: 1.8rem; background: rgba(255, 255, 255, 0.7); border-radius: 12px; box-shadow: inset 0 2px 10px rgba(255,255,255,0.5), 0 4px 15px rgba(0,0,0,0.03); }
        
        table { border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(15,76,219,0.05); }
        th { font-family: 'Kanit', sans-serif; font-size: 1.1rem !important; letter-spacing: 0.5px; opacity: 0.9; }
        tbody tr { transition: background 0.3s; }
        tbody tr:hover { background: rgba(15, 76, 219, 0.03) !important; }
        
        nav { background: #0f4cdb !important; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: 0 8px 32px rgba(15,76,219,0.2) !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: .7rem 5rem !important; }
        nav .logo-main, nav .logo-tag { color: #fff !important; }
        nav .nl { color: rgba(255, 255, 255, 0.8) !important; transition: all 0.3s; position: relative; text-decoration: none !important; font-weight: 600 !important; }
        nav .nl:hover { color: #fff !important; }
        nav .nl.active { color: #fff !important; }
        nav .nl::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: #fff !important; transition: width 0.3s; }
        nav .nl.active::after { width: 100% !important; }
        nav .nl:hover::after { width: 100% !important; }
        .logo-box { background: #fff !important; padding: 4px; display: flex; align-items: center; justify-content: center; }
        .logo-box svg { width: 24px; height: 24px; }
        .logo-box svg circle { stroke: #0f4cdb !important; }
        .logo-box svg path { stroke: #0f4cdb !important; fill: rgba(15, 76, 219, 0.1) !important; }

        body, a, button, .btn-fire, .logo, .nl, input, textarea { cursor: auto !important; }
        .btn-out { transition: all 0.3s; border-radius: 6px; } .btn-out:hover { background:#ff4757; color:#fff; border-color:#ff4757; }
    </style>
</head>
<body>
    <nav id="nav">
        <a class="logo" href="admin.html">
            <div class="logo-box">
                <svg viewBox="0 0 28 28">
                    <circle cx="20" cy="5" r="3" stroke="#fff" stroke-width="1.5" fill="none" />
                    <path d="M6 20 C8 14,13 12,17 9 L21 8 L19 16 C17 18,14 20,11 23 L8 26 L5 24 Z" stroke="#fff" stroke-width="1.5" fill="rgba(255,255,255,.2)" />
                </svg>
            </div>
            <div class="logo-words">
                <div class="logo-main">SKATING<span>HOUR</span></div>
                <span class="logo-tag">Admin Panel</span>
            </div>
        </a>
        <ul id="nav-ul">
            <li><a class="nl" href="admin.html">Schedules</a></li>
            <li><a class="nl active" href="enquiries.html">Database</a></li>
            <li><a class="nl" href="livechat.html">Live Chat</a></li>
            <li><a class="nl" href="index.html">Back to Site</a></li>
        </ul>
    </nav>

    <div class="admin-wrap">
        <h1 class="admin-title">Enquiries & Subscribers</h1>
        <p style="margin-bottom: 2rem;">Overview of all forms securely logged through the website.</p>
        
        <div class="loc-form">
            <div style="overflow-x: auto;">
                <table id="enquiries-table" style="width: 100%; border-collapse: collapse; text-align: left; margin-bottom: 1rem; background: #fff;">
                    <thead>
                        <tr style="border-bottom: 2px solid #0f4cdb; color: #050d1e;">
                            <th style="padding: 0.8rem 0.5rem; font-size: 0.85rem;">Date</th>
                            <th style="padding: 0.8rem 0.5rem; font-size: 0.85rem;">Type/Name</th>
                            <th style="padding: 0.8rem 0.5rem; font-size: 0.85rem;">Phone</th>
                            <th style="padding: 0.8rem 0.5rem; font-size: 0.85rem;">Email</th>
                            <th style="padding: 0.8rem 0.5rem; font-size: 0.85rem;">Location</th>
                            <th style="padding: 0.8rem 0.5rem; font-size: 0.85rem;">Participants</th>
                            <th style="padding: 0.8rem 0.5rem; font-size: 0.85rem;">Message</th>
                        </tr>
                    </thead>
                    <tbody id="enquiries-body">
                        <!-- Dynamic -->
                    </tbody>
                </table>
            </div>
            <button class="btn-out" style="padding: 0.6rem 1.2rem; font-size: 0.75rem;" onclick="clearEnquiries()">Clear Database</button>
        </div>
    </div>
    
    <script src="enquiries.js"></script>
</body>
</html>
